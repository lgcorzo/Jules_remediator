apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: jules-remediator-source
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/lgcorzo/Jules_remediator
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: jules-remediator
  namespace: flux-system
spec:
  interval: 5m
  path: "./deploy/base"
  prune: true
  sourceRef:
    kind: GitRepository
    name: jules-remediator-source
  targetNamespace: jules-remediator
