apiVersion: v1
kind: ServiceAccount
metadata:
  name: jules-remediator
  namespace: jules-remediator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jules-remediator-role
rules:
  # To detect errors
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # To analyze and fix Pods
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch", "patch"]
  # To apply fixes at higher level
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jules-remediator-binding
subjects:
  - kind: ServiceAccount
    name: jules-remediator
    namespace: jules-remediator
roleRef:
  kind: ClusterRole
  name: jules-remediator-role
  apiGroup: rbac.authorization.k8s.io
