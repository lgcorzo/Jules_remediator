apiVersion: apps/v1
kind: Deployment
metadata:
  name: jules-remediator
  namespace: jules-remediator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jules-remediator
  template:
    metadata:
      labels:
        app: jules-remediator
    spec:
      priorityClassName: jules-remediator-priority
      serviceAccountName: jules-remediator-sa
      containers:
      - name: remediator
        image: lgcorzo/jules-remediator:latest
        ports:
        - containerPort: 8000
        env:
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow.mlflow.svc.cluster.local:5000"
        - name: JULES_DISPATCHER_URI
          value: "http://jules-cloud-vm.internal:8080/mcp"
        - name: LITELLM_ENDPOINT
          value: "http://litellm.llm-apps.svc.cluster.local/v1"
        - name: LITELLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: LITELLM_MASTER_KEY
        - name: JULES_API_KEY
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: LITELLM_MASTER_KEY
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: litellm-secrets
              key: GITHUB_TOKEN
        - name: GITOPS_REPO_URL
          value: "https://github.com/lgcorzo/gitops_internal_lgcorzo.git"
        - name: GITOPS_REPO_PATH
          value: "/data/gitops-repo"
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          limits:
            cpu: "500m"
            memory: "1024Mi"
          requests:
            cpu: "200m"
            memory: "512Mi"
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: jules-remediator
  namespace: jules-remediator
spec:
  selector:
    app: jules-remediator
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jules-remediator-sa
  namespace: jules-remediator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jules-remediator-role
rules:
- apiGroups: [""]
  resources: ["events", "pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "deployments/scale", "statefulsets/scale"]
  verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jules-remediator-role-binding
subjects:
- kind: ServiceAccount
  name: jules-remediator-sa
  namespace: jules-remediator
roleRef:
  kind: ClusterRole
  name: jules-remediator-role
  apiGroup: rbac.authorization.k8s.io
