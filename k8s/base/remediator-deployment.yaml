apiVersion: apps/v1
kind: Deployment
metadata:
  name: jules-remediator
  namespace: jules-remediator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jules-remediator
  template:
    metadata:
      labels:
        app: jules-remediator
    spec:
      serviceAccountName: jules-remediator-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
      - name: remediator
        image: lgcorzo/jules-remediator:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8000
        env:
        - name: MLFLOW_TRACKING_URI
          value: "http://mlflow.mlflow.svc.cluster.local:5000"
        - name: JULES_API_KEY
          valueFrom:
            secretKeyRef:
              name: jules-api-key
              key: api-key
        resources:
          limits:
            cpu: "500m"
            memory: "1024Mi"
          requests:
            cpu: "200m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: jules-remediator
  namespace: jules-remediator
spec:
  selector:
    app: jules-remediator
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jules-remediator-sa
  namespace: jules-remediator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jules-remediator-cluster-admin
subjects:
- kind: ServiceAccount
  name: jules-remediator-sa
  namespace: jules-remediator
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
